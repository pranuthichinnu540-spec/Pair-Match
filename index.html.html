<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pair Match - Memory Card Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Pair Match</h1>
        
        <!-- Season Selection -->
        <div class="season-selector">
            <h3>Choose a Season:</h3>
            <div class="seasons">
                <button class="season-btn active" onclick="selectSeason(0)">
                    <span class="season-icon">😊</span>
                    <span class="season-name">Season 1<br>Emojis</span>
                </button>
                <button class="season-btn" onclick="selectSeason(1)">
                    <span class="season-icon">🐸</span>
                    <span class="season-name">Season 2<br>Animals</span>
                </button>
                <button class="season-btn" onclick="selectSeason(2)">
                    <span class="season-icon">🏰</span>
                    <span class="season-name">Season 3<br>Places</span>
                </button>
                <button class="season-btn" onclick="selectSeason(3)">
                    <span class="season-icon">🍎</span>
                    <span class="season-name">Season 4<br>Fruits</span>
                </button>
                <button class="season-btn" onclick="selectSeason(4)">
                    <span class="season-icon">🥕</span>
                    <span class="season-name">Season 5<br>Vegetables</span>
                </button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="label">Moves:</span>
                <span class="value" id="moves">0</span>
            </div>
            <div class="stat">
                <span class="label">Matches:</span>
                <span class="value" id="matches">0/8</span>
            </div>
            <div class="stat">
                <span class="label">Time:</span>
                <span class="value" id="timer">0s</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="buttons">
            <button class="btn btn-reset" onclick="resetGame()">New Game</button>
            <button class="btn btn-difficulty" onclick="changeDifficulty()">Difficulty: Easy</button>
        </div>

        <div class="modal" id="winModal">
            <div class="modal-content">
                <h2>🎉 You Won!</h2>
                <p id="winMessage"></p>
                <button class="btn btn-reset" onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
